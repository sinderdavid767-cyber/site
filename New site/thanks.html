<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Спасибо!</title>
  <style>
    body{margin:0;font-family:system-ui;background:#05060a;color:#e5e7eb;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:18px}
    .card{max-width:700px;width:100%;background:#0b1220;border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:22px}
    h1{margin:0 0 10px}
    p{margin:0 0 16px;color:#a1a1aa;line-height:1.45}
    a{color:#ffb3c1;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="card">
    <h1 id="t1">Спасибо!</h1>
    <p id="t2">Заявка отправлена. Мы свяжемся с вами в ближайшее время.</p>
    <a href="/" id="t3">← Вернуться на сайт</a>
  </div>

  <script>
    const lang = localStorage.getItem("lang") || "ru";
    const T = {
      ru:{t1:"Спасибо!", t2:"Заявка отправлена. Мы свяжемся с вами в ближайшее время.", t3:"← Вернуться на сайт"},
      ua:{t1:"Дякуємо!", t2:"Заявку надіслано. Ми зв’яжемося з вами найближчим часом.", t3:"← Повернутися на сайт"},
      en:{t1:"Thank you!", t2:"Your request was sent. We’ll contact you soon.", t3:"← Back to website"}
    };
    document.documentElement.lang = lang==="ua" ? "uk" : lang;
    document.getElementById("t1").textContent = (T[lang]||T.ru).t1;
    document.getElementById("t2").textContent = (T[lang]||T.ru).t2;
    document.getElementById("t3").textContent = (T[lang]||T.ru).t3;
  </script>
</body>
</html>
